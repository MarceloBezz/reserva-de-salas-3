spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.application.name=servico-sala
eureka.client.serviceUrl.defaultZone=${EUREKA_URL}
eureka.instance.instance-id=${spring.application.name}:${random.int}
eureka.instance.prefer-ip-address=true
server.port=0
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
# logging.level.org.springframework.cache=TRACE
# logging.level.org.springframework.data.redis=TRACE
# logging.level.org.springframework.web=DEBUG
# logging.level.org.springframework.aop=TRACE
# logging.level.org.springframework.transaction=TRACE
# server.error.include-stacktrace=always
# server.error.include-message=always

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${JAEGER_URL}
logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]