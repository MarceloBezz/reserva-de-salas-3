apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-server
  template:
    metadata:
      labels:
        app: ms-server
    spec:
      containers:
      - name: ms-server
        image: marcelobezz07/reservas-server:latest
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-gateway
  template:
    metadata:
      labels:
        app: ms-gateway
    spec:
      containers:
      - name: ms-gateway
        image: marcelobezz07/reservas-gateway:latest
        ports:
        - containerPort: 8081

        envFrom:
          - secretRef:
              name: gateway-env
---
