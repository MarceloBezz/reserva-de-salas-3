apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-batch-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-batch
  template:
    metadata:
      labels:
        app: ms-batch
    spec:
      volumes:
        - name: relatorios
          persistentVolumeClaim:
            claimName: relatorios-pvc

      containers:
      - name: ms-batch
        image: marcelobezz07/reservas-ms-batch:latest

        envFrom:
          - secretRef:
              name: batch-env

        volumeMounts:
          - name: relatorios
            mountPath: /relatorios
---
