services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=reservas_servico_reserva 
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    networks:
      - ms-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOO_4LW_COMMANDS_WHITELIST: ruok
    ports:
      - "2181:2181"
    healthcheck:
      # test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ms-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ms-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - ms-network
      
  server:
    image: marcelobezz07/reservas-server:latest
    container_name: ms-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ms-network

  gateway:
    image: marcelobezz07/reservas-gateway:latest
    container_name: ms-gateway
    ports:
      - "8081:8081"
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/gateway.env
    networks:
      - ms-network

  usuario:
    image: marcelobezz07/reservas-ms-usuario:latest
    container_name: ms-usuario
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/usuarios.env
    networks:
      - ms-network

  sala:
    image: marcelobezz07/reservas-ms-sala:latest
    container_name: ms-sala
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/salas.env
    networks:
      - ms-network

  reserva:
    image: marcelobezz07/reservas-ms-reserva:latest
    container_name: ms-reserva
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/reservas.env
    networks:
      - ms-network

  email:
    image: marcelobezz07/reservas-ms-email:latest
    container_name: ms-email
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/email.env
    networks:
      - ms-network

  log:
    image: marcelobezz07/reservas-ms-log:latest
    container_name: ms-log
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/log.env
    networks:
      - ms-network

  batch:
    image: marcelobezz07/reservas-ms-batch:latest
    container_name: ms-batch
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/batch.env
    networks:
      - ms-network
    volumes:
    - ./relatorios:/relatorios

  sugestoes:
    image: marcelobezz07/reservas-ms-sugestoes:latest
    container_name: ms-sugestoes
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/sugestao-horarios.env
    ports:
      - "8085:8085"
    networks:
      - ms-network

volumes:
  mysql_data:

networks:
  ms-network:
    driver: bridge