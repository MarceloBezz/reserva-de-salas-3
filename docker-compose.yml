services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=reservas_servico_reserva 
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    networks:
      - ms-network

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # LISTENERS: interno + externo + controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - ms-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ms-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - ms-network
      
  server:
    image: marcelobezz07/reservas-server:latest
    container_name: ms-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ms-network

  gateway:
    image: marcelobezz07/reservas-gateway:latest
    container_name: ms-gateway
    ports:
      - "8081:8081"
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/gateway.env
    networks:
      - ms-network

  usuario:
    image: marcelobezz07/reservas-ms-usuario:latest
    container_name: ms-usuario
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/usuarios.env
    networks:
      - ms-network

  sala:
    image: marcelobezz07/reservas-ms-sala:latest
    container_name: ms-sala
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/salas.env
    networks:
      - ms-network

  reserva:
    image: marcelobezz07/reservas-ms-reserva:latest
    container_name: ms-reserva
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/reservas.env
    networks:
      - ms-network

  email:
    image: marcelobezz07/reservas-ms-email:latest
    container_name: ms-email
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/email.env
    networks:
      - ms-network

  log:
    image: marcelobezz07/reservas-ms-log:latest
    container_name: ms-log
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/log.env
    networks:
      - ms-network

  batch:
    image: marcelobezz07/reservas-ms-batch:latest
    container_name: ms-batch
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/batch.env
    networks:
      - ms-network
    volumes:
    - ./relatorios:/relatorios

  sugestoes:
    image: marcelobezz07/reservas-ms-sugestoes:latest
    container_name: ms-sugestoes
    depends_on:
      server:
        condition: service_healthy
    env_file: ./env/docker/sugestao-horarios.env
    ports:
      - "8085:8085"
    networks:
      - ms-network

volumes:
  mysql_data:

networks:
  ms-network:
    driver: bridge